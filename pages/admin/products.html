<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Products</title>
    <link href="../../css/bootstrap.css" rel="stylesheet">
    <link href="../../css/style.css" rel="stylesheet">
</head>
<body>
<div class="page-wrap">
    <header class="site-header admin-header"></header>
    <main>
        <section class="container py-4 py-lg-5">
            <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
                <h1 class="section-title mb-0">Products</h1>
                <a class="btn-base btn-black" href="create.html">+ Add New Product</a>
            </div>
            <div class="admin-table">
                <table class="table align-middle mb-0">
                    <thead>
                    <tr>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr class="product-item">
                        <td>
                            <div class="placeholder-media">IMG</div>
                        </td>
                        <td>MacBook Pro 14&quot;</td>
                        <td>Laptops</td>
                        <td>$1999</td>
                        <td>5</td>
                        <td>
                            <div class="d-flex gap-2 flex-wrap">
                                <a class="btn-base btn btn-sm btn-outline-dark"
                                   href="edit.html">Edit</a>
                                <button class="btn-base btn btn-sm btn-danger">Delete</button>
                            </div>
                        </td>
                    </tr>
                    <tr class="product-item">
                        <td>
                            <div class="placeholder-media">IMG</div>
                        </td>
                        <td>MacBook Pro 16&quot;</td>
                        <td>Laptops</td>
                        <td>$2499</td>
                        <td>3</td>
                        <td>
                            <div class="d-flex gap-2 flex-wrap">
                                <a class="btn-base btn btn-sm btn-outline-dark" href="edit.html">Edit</a>
                                <button class="btn-base btn btn-sm btn-danger">Delete</button>
                            </div>
                        </td>
                    </tr>
                    <tr class="product-item">
                        <td>
                            <div class="placeholder-media">IMG</div>
                        </td>
                        <td>MacBook Pro Air</td>
                        <td>Laptops</td>
                        <td>$1299</td>
                        <td>10</td>
                        <td>
                            <div class="d-flex gap-2 flex-wrap">
                                <a class="btn-base btn btn-sm btn-outline-dark" href="edit.html">Edit</a>
                                <button class="btn-base btn btn-sm btn-danger">Delete</button>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
    <footer class="site-footer mt-auto"></footer>
</div>
<script src="../../js/bootstrap.bundle.js"></script>
<script src="../../js/components.js"></script>
</body>
</html>
