<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Login</title>
    <link href="../../css/bootstrap.css" rel="stylesheet">
    <link href="../../css/style.css" rel="stylesheet">
</head>
<body>
<div class="page-wrap">
    <header class="site-header admin-header"></header>
    <main>
        <section class="container auth-shell">
            <div class="auth-card">
                <h1 class="h2 fw-bold mb-4 text-center">Admin Login</h1>
                <div class="mb-3">
                    <label class="form-label" for="email">Email</label>
                    <input id="email" class="form-control" type="email" placeholder="admin@domain.com" value="">
                </div>
                <div class="mb-3">
                    <label class="form-label" for="password">Password</label>
                    <input id="password" class="form-control" type="password" placeholder="••••••••" value="">
                </div>
                <button class="btn-base btn-black w-100">Login</button>
                <div class="text-center mt-3">
                    <a href="../home.html" class="small muted text-decoration-underline">Back to Store</a>
                </div>
            </div>
        </section>
    </main>
    <footer class="site-footer mt-auto"></footer>
</div>
<script src="../../js/bootstrap.bundle.js"></script>
<script src="../../js/components.js"></script>
</body>
</html>
