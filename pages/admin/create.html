<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create Product</title>
    <link href="../../css/bootstrap.css" rel="stylesheet">
    <link href="../../css/style.css" rel="stylesheet">
</head>
<body>
<div class="page-wrap">
    <header class="site-header admin-header"></header>
    <main>
        <section class="container py-4 py-lg-5">
            <h1 class="section-title">Create Product</h1>
            <div class="admin-form-grid align-items-start">
                <div class="admin-card p-4">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label" for="product-name">Product Name *</label>
                            <input id="product-name" class="form-control" placeholder="Product name" value="">
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="description">Description *</label>
                            <textarea id="description" class="form-control" rows="5"
                                      placeholder="Describe the product"></textarea>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="price">Price *</label>
                            <input id="price" class="form-control" type="number" min="0" placeholder="1999" value="">
                            <div class="small muted mt-1">USD</div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="category">Category *</label>
                            <select id="category" class="form-select">
                                <option selected>Laptops</option>
                                <option>Phones</option>
                                <option>Accessories</option>
                            </select></div>
                        <div class="col-md-6">
                            <label class="form-label" for="brand">Brand *</label>
                            <input id="brand" class="form-control" placeholder="Apple" value="">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="stock">Stock *</label>
                            <input id="stock" class="form-control" type="number" min="0" placeholder="5" value="">
                            <div class="small muted mt-1">Number of items available</div>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between flex-wrap gap-2 mt-4">
                        <div></div>
                        <div class="d-flex gap-2">
                            <button class="btn-base btn-lightish">Cancel</button>
                            <button class="btn-base btn-black">Save Product</button>
                        </div>
                    </div>
                </div>
                <div class="admin-card p-4">
                    <div class="fw-semibold mb-3">Images</div>
                    <div class="row g-3">
                        <div class="col-sm-6">
                            <div class="upload-box">Add Image</div>
                        </div>
                        <div class="col-sm-6">
                            <div class="upload-box">Add Image</div>
                        </div>
                        <div class="col-sm-6">
                            <div class="upload-box">Add Image</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer class="site-footer mt-auto"></footer>
</div>
<script src="../../js/bootstrap.bundle.js"></script>
<script src="../../js/components.js"></script>
</body>
</html>
