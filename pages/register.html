<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register</title>
    <link href="../css/bootstrap.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body>
<div class="page-wrap">
    <header class="site-header"></header>
    <main>
        <section class="container auth-shell">
            <div class="auth-card">
                <h1 class="h2 fw-bold mb-4 text-center">Register</h1>
                <div class="mb-3">
                    <label class="form-label" for="full-name">Full Name</label>
                    <input id="full-name" class="form-control" placeholder="John Doe">
                </div>
                <div class="mb-3">
                    <label class="form-label" for="email">Email</label>
                    <input id="email" class="form-control" type="email" placeholder="email@domain.com">
                </div>
                <div class="mb-3">
                    <label class="form-label" for="password">Password</label>
                    <input id="password" class="form-control" type="password" placeholder="••••••••">
                </div>
                <div class="mb-3">
                    <label class="form-label" for="confirm-password">Confirm Password</label>
                    <input id="confirm-password" class="form-control" type="password" placeholder="••••••••">
                </div>
                <button class="btn-base btn-black w-100">Register</button>
                <div class="text-center mt-3">
                    <a href="login.html" class="small">Already have an account? Login</a>
                </div>
            </div>
        </section>
    </main>
    <footer class="site-footer mt-auto"></footer>
</div>
<script src="../js/bootstrap.bundle.js"></script>
<script src="../js/components.js"></script>
</body>
</html>
